<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Biglietto Treno</title>
</head>
<body>
    <form>
        <input type="text" id="ageField" placeholder="Inserisci la tua età" required>
        <input type="text" id="kmField" placeholder="Inserisci i km da percorrere">
        <button id="calcolaBtn">Calcola il prezzo</button>
    </form>
    <hr
    <div>Età: <span id="age"></span></div>
    <div>Chilometri da percorrere: <span id="km"></span></div>
    <div>Costo biglietto: <span id="costoBiglietto"></span></div>
    <script src="./main.js"></script>
</body>
</html>
