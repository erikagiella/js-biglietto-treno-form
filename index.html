<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Biglietto Treno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav class="navbar bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <img src="./img/logo-treno.png" alt="Logo" width="40" class="d-inline-block align-text-center">
                    <span id="logo-title">Erika Trains</span>
                </a>
            </div>
        </nav>
    </header>
    <main>
        <!-- Form -->
        <div class="container">
            <h1 class="text-center">Calcola il prezzo del tuo biglietto</h1>
            <form class="container text-center mt-3 bc-light border-set">
                <div class="row">
                    <div class="col">
                        <div class="bold">Nome e cognome</div>
                        <input type="text" id="nameField" placeholder="Nome e cognome" required>
                    </div>
                    <div class="col">
                        <div class="bold">La tua età</div>
                        <input type="number" id="ageField" placeholder="Età" required>
                    </div>
                    <div class="col">
                        <div class="bold">Km da percorrere</div>
                        <input type="number" id="kmField" placeholder="km" required>
                    </div>
                </div>
                <button class="mt-4 bold" id="calcolaBtn">Calcola!</button>
            </form>
        </div>

        <!-- Biglietto -->
        <div class="container text-center">
            <h1> Il tuo biglietto</h1>
            <div class="container text-center mt-3 bc-light border-set px-5">
                <div class="row">
                    <div class="col-sm-4">
                        <div class="row">
                            <div class="col">Passeggero:</div>
                            <div class="col">
                                <span class="bold" id="name">N/D</span>
                            </div>
                        </div>
                        <div class="row mt-4">
                            <div class="col">Età:</div>
                            <div class="col">
                                <span class="bold" id="age">N/D</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-8">
                        <div class="row">
                            <div class="col">
                                Chilometri da percorrere:
                            </div>
                            <div class="col">
                                Tariffa applicata:
                            </div>
                            <div class="col">
                                Costo biglietto:
                            </div>
                        </div>
                        <div class="row mt-2">
                            <div class="col">
                                <span class="bold" id="km">N/D</span>
                            </div>
                            <div class="col">
                                <span class="bold " id="tariffa">N/D</span>
                            </div>
                            <div class="col">
                                <span class="bold display-6" id="costoBiglietto">N/D</span>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
        </div>

        <div></div>
        <div></span></div>
        <div>
        </div>
        </div>
    </main>
    <script src="./main.js"></script>
</body>

</html>
