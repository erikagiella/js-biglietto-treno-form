<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Biglietto Treno</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="container">
            <nav class="navbar navbar-expand-lg ">
                <div class="container-fluid">
                    <a class="navbar-brand text-dark d-flex flex-row align-items-center text-uppercase gap-3 mx-auto"
                        href="#">
                        <i class="bi bi-train-freight-front-fill fs-2"></i>
                        <h1 id="logo-title" class="text-dark fw-bolder">Erika's Trains</h1>
                    </a>
                </div>
            </nav>
        </div>
    </header>
    <main class="mt-2">
        <div class="container">
            <div class="row gx-4 gy-4 justify-content-center">
                <div class="col-12 col-lg-6">
                    <div class="card shadow-sm border-0 rounded-4">
                        <div class="card-body">
                            <h2 class="card-title text-center text-uppercase fw-bolder mb-3">
                                Calcola il prezzo del tuo biglietto
                            </h2>

                            <form id="ticketForm" class="row g-3">
                                <div class="col-12">
                                    <label for="nameField" class="form-label fw-medium">Nome e cognome</label>
                                    <input type="text" class="form-control" id="nameField" placeholder="Nome e cognome"
                                        required>
                                </div>

                                <div class="col-12 col-md-6">
                                    <label for="ageField" class="form-label fw-medium">La tua età</label>
                                    <input type="number" class="form-control" id="ageField" placeholder="Età" min="0"
                                        required>
                                </div>

                                <div class="col-12 col-md-6">
                                    <label for="kmField" class="form-label fw-medium">Km da percorrere</label>
                                    <input type="number" class="form-control" id="kmField" placeholder="Km" min="0"
                                        required>
                                </div>

                                <div class="col-12 text-center mt-4">
                                    <button type="submit" class="btn btn-warning text-uppercase fw-bold fs-5 px-4"
                                        id="calcolaBtn">Calcola</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-lg-6">
                    <div class="card shadow-sm border-0 rounded-4 mb-4">
                        <div class="card-body">
                            <h2 class="card-title text-center text-uppercase fw-bolder mb-3">Il tuo biglietto</h2>

                            <ul class="list-group list-group-flush">
                                <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                                    <span class="text-muted">Passeggero</span>
                                    <strong id="name">N/D</strong>
                                </li>
                                <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                                    <span class="text-muted">Età</span>
                                    <strong id="age">N/D</strong>
                                </li>
                                <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                                    <span class="text-muted">Km</span>
                                    <strong id="km">N/D</strong>
                                </li>
                                <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                                    <span class="text-muted">Tariffa</span>
                                    <strong id="tariffa">N/D</strong>
                                </li>
                                <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                                    <span class="text-muted">Costo</span>
                                    <span class="display-6 fw-bold" id="costoBiglietto">N/D</span>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="./main.js"></script>
</body>

</html>
